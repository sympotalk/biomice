name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - "**"
      - "!main"  # main에는 이미 deploy.yml이 동작하므로 중복 방지

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint · Type-check · Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Next.js build
        run: npm run build
        env:
          # 빌드 시 클라이언트 번들에 포함되는 공개 변수만 설정.
          # 실제 시크릿은 deploy.yml에서만 사용됨.
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL || 'https://example.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY || 'sb_publishable_placeholder' }}
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL || 'https://biomice.xyz' }}

      - name: Build size summary
        if: success()
        run: |
          echo "## Build size" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          du -sh .next 2>/dev/null || true
          du -sh .next >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
